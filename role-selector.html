<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register — Isuku Track</title>

  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/role-selector.css" />
</head>
<body>

  <main class="auth-page">
    <div class="auth-card">

      <!-- Branding -->
      <div class="app-brand">
        <div class="app-brand__name">Isuku Track</div>
        <div class="app-brand__subtitle">Waste Collection Management</div>
      </div>

      <!-- Heading -->
      <div class="page-heading">
        <h1>Create an account</h1>
        <p>Who are you signing up as?</p>
      </div>

      <!-- Role Cards -->
      <a href="resident-register.html" class="role-card">
        <div class="role-card__text">
          <div class="role-card__title">Resident</div>
          <div class="role-card__subtitle">Register as a resident in your zone</div>
        </div>
        <span class="role-card__arrow">›</span>
      </a>

      <a href="zo-verify.html" class="role-card">
        <div class="role-card__text">
          <div class="role-card__title">Zone Operator</div>
          <div class="role-card__subtitle">Verify your identity to access your zone</div>
        </div>
        <span class="role-card__arrow">›</span>
      </a>

      <p class="role-note">Admins sign in from the login page directly</p>

      <!-- Back to login -->
      <p class="auth-footer">
        Already have an account?
        <a href="login.html">Sign in</a>
      </p>

    </div>
  </main>

</body>
</html>
