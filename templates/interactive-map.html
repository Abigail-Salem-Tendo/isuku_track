<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Isuku Track - Zone Coverage</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

    <style>
        body { margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        #map { height: 100vh; width: 100vw; }
        
        /* popup card styling */
        .popup-content h3 { margin: 0 0 8px 0; color: #2c3e50; border-bottom: 1px solid #eee; padding-bottom: 5px; }
        .popup-content p { margin: 5px 0; font-size: 14px; color: #34495e; }
        .popup-content strong { color: #2c3e50; }
        .status-badge { 
            display: inline-block; 
            margin-top: 8px; 
            padding: 3px 8px; 
            background-color: #e8f8f5; 
            color: #117a65; 
            border-radius: 12px; 
            font-size: 12px; 
            font-weight: bold; 
        }
        .pending { background-color: #fdf2e9; color: #d35400; }
    </style>
</head>
<body>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <script src="/static/js/interactive_map.js"></script>
</body>
</html>
