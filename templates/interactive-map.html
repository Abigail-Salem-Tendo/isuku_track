<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Isuku Track - Zone Coverage</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.css" />
    <link rel="stylesheet" href="/static/css/interactive-map.css" />
    
</head>
<body>

    <div id="map"></div>
    
    <div class="command-panel">
        <div class="panel-header">
            <span>Command Centre</span>
            <i class="fa-solid fa-satellite-dish"></i>
        </div>
        
        <div class="panel-tabs">
            <div class="panel-tab active" id="tab-zones" onclick="switchTab('zones')">Zones</div>
            <div class="panel-tab" id="tab-operators" onclick="switchTab('operators')">Operators</div>
            <div class="panel-tab" id="tab-fleet" onclick="switchTab('fleet')">Fleet</div>
        </div>

        <div class="panel-content" id="sidebarContent">
            <div style="text-align:center; padding: 20px; color:#999;">Loading telemetry...</div>
        </div>
    </div>

    <div class="map-navbar">
        <a href="/templates/admin/admin_dash.html">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
            Back to Dashboard
        </a>
        <span style="color: #ddd;">|</span>
        <span style="font-weight: 600; color: #333;">Zone Creation Map</span>
    </div>

    <div id="adminModal" style="display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.7); z-index: 999999; justify-content: center; align-items: center; font-family: 'Segoe UI', sans-serif;">
        <div style="background: white; padding: 25px; border-radius: 12px; width: 400px; max-width: 90%; box-shadow: 0 10px 30px rgba(0,0,0,0.3);">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                <h3 id="modalTitle" style="margin: 0; color: #2c3e50;">Modal Title</h3>
                <button type="button" onclick="document.getElementById('adminModal').style.display='none'" style="border: none; background: none; font-size: 24px; cursor: pointer; color: #7f8c8d;">&times;</button>
            </div>
            <form id="modalForm">
                </form>
        </div>
    </div>
    
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.js"></script>
    <script src="/static/js/interactive_map.js"></script>
</body>
</html>
