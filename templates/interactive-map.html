<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Isuku Track - Zone Coverage</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  
    <link rel="stylesheet" href="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.css" />
    

    <style>
        body { margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }

        /* --- COMMAND CENTRE SIDEBAR --- */
        .command-panel {
            position: absolute;
            top: 80px;
            left: 20px;
            width: 320px;
            max-height: calc(100vh - 100px);
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.15);
            z-index: 1000;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            font-family: 'Segoe UI', sans-serif;
        }
        .panel-header {
            background: #2e7d52;
            color: white;
            padding: 15px 20px;
            font-weight: bold;
            font-size: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .panel-content {
            padding: 15px;
            overflow-y: auto;
            flex: 1;
        }
        .panel-section-title {
            font-size: 12px;
            text-transform: uppercase;
            color: #7f8c8d;
            font-weight: bold;
            margin-bottom: 10px;
            margin-top: 15px;
            border-bottom: 1px solid #eee;
            padding-bottom: 5px;
        }
        /* List Items */
        .entity-item {
            display: flex;
            align-items: center;
            padding: 10px;
            margin-bottom: 8px;
            background: #f8f9fa;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            border-left: 4px solid transparent;
        }
        .entity-item:hover { background: #e8f8f5; border-left-color: #2e7d52; }
        .entity-icon {
            width: 30px; height: 30px; border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            margin-right: 12px; color: white; font-size: 14px;
        }
        .bg-zone { background: #3498db; }
        .bg-operator { background: #f39c12; }
        .bg-vehicle { background: #9b59b6; }
        
        .entity-details { flex: 1; }
        .entity-name { font-size: 14px; font-weight: 600; color: #2c3e50; }
        .entity-sub { font-size: 12px; color: #7f8c8d; }

        /* Custom Map Icon CSS */
        .custom-map-icon {
            background: white; border-radius: 50%;
            border: 2px solid #fff; box-shadow: 0 2px 5px rgba(0,0,0,0.3);
            display: flex; justify-content: center; align-items: center;
            font-size: 16px;
        }
    
        /* Floating Navbar */
        .map-navbar {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            background: white;
            padding: 12px 24px;
            border-radius: 30px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.15);
            display: flex;
            align-items: center;
            gap: 15px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .map-navbar a {
            text-decoration: none;
            color: #2e7d52;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .map-navbar a:hover { color: #1b4d32; }

        /* --- SIDEBAR TABS --- */
        .panel-tabs {
            display: flex;
            background: #f8f9fa;
            border-bottom: 1px solid #ddd;
        }
        .panel-tab {
            flex: 1;
            text-align: center;
            padding: 10px 0;
            font-size: 13px;
            font-weight: bold;
            color: #7f8c8d;
            cursor: pointer;
            border-bottom: 2px solid transparent;
            transition: all 0.2s;
        }
        .panel-tab:hover { color: #2e7d52; background: #eee; }
        .panel-tab.active {
            color: #2e7d52;
            border-bottom-color: #2e7d52;
            background: white;
        }
        
        /* Draggable visual cue */
        .draggable-item {
            cursor: grab;
            border: 1px dashed transparent;
        }
        .draggable-item:active { cursor: grabbing; border-color: #2e7d52; }
        
        /* Modernize the Search Bar */
        .leaflet-control-geocoder {
            border-radius: 8px !important;
            box-shadow: 0 4px 15px rgba(0,0,0,0.15) !important;
            border: none !important;
        }
        .leaflet-control-geocoder-form input {
            padding: 12px 15px !important;
            font-size: 15px !important;
            width: 280px !important;
            font-family: 'Segoe UI', sans-serif;
        }
        #map { height: 100vh; width: 100vw; }
        
        /* popup card styling */
        .popup-content h3 { margin: 0 0 8px 0; color: #2c3e50; border-bottom: 1px solid #eee; padding-bottom: 5px; }
        .popup-content p { margin: 5px 0; font-size: 14px; color: #34495e; }
        .popup-content strong { color: #2c3e50; }
        .status-badge { 
            display: inline-block; 
            margin-top: 8px; 
            padding: 3px 8px; 
            background-color: #e8f8f5; 
            color: #117a65; 
            border-radius: 12px; 
            font-size: 12px; 
            font-weight: bold; 
        }
        .pending { background-color: #fdf2e9; color: #d35400; }
    </style>
</head>
<body>

    <div id="map"></div>
    
    <div class="command-panel">
        <div class="panel-header">
            <span>Command Centre</span>
            <i class="fa-solid fa-satellite-dish"></i>
        </div>
        <div class="panel-content" id="sidebarContent">
            <div style="text-align:center; padding: 20px; color:#999;">Loading telemetry...</div>
        </div>
    </div>

    <div class="map-navbar">
        <a href="/templates/admin/admin_dash.html">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
            Back to Dashboard
        </a>
        <span style="color: #ddd;">|</span>
        <span style="font-weight: 600; color: #333;">Zone Creation Map</span>
    </div>

    <div id="adminModal" style="display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.6); z-index: 9999; justify-content: center; align-items: center;">
        <div style="background: white; padding: 25px; border-radius: 12px; width: 400px; max-width: 90%; box-shadow: 0 10px 25px rgba(0,0,0,0.2);">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 1px solid #eee; padding-bottom: 10px;">
                <h3 id="modalTitle" style="margin: 0; color: #2c3e50;">Create New Zone</h3>
                <button id="modalClose" style="background: none; border: none; font-size: 24px; cursor: pointer; color: #7f8c8d;">&times;</button>
            </div>
            <form id="modalForm" style="display: flex; flex-direction: column; gap: 15px;"></form>
        </div>
    </div>
    
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.js"></script>
    <script src="/static/js/interactive_map.js"></script>
</body>
</html>
