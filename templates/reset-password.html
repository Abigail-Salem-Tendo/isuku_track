<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Set Password | Isuku Track</title>
    
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .auth-card {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        .logo-circle {
            width: 60px;
            height: 60px;
            background: #2e7d52;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0 auto 20px;
        }

        .logo-circle svg {
            stroke: white;
            width: 30px;
            height: 30px;
        }

        h2 {
            margin: 0 0 10px 0;
            color: #2c3e50;
        }

        p {
            color: #7f8c8d;
            font-size: 14px;
            margin-bottom: 30px;
        }

        .input-group {
            text-align: left;
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            font-size: 13px;
            color: #34495e;
            margin-bottom: 5px;
            font-weight: 600;
        }

        .input-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 15px;
            box-sizing: border-box;
            transition: border-color 0.2s;
        }

        .input-group input:focus {
            outline: none;
            border-color: #2e7d52;
        }

        .btn-submit {
            width: 100%;
            background: #2e7d52;
            color: white;
            border: none;
            padding: 14px;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn-submit:hover {
            background: #1b4d32;
        }

        .error-state {
            display: none;
            color: #e74c3c;
            background: #fdf2e9;
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 20px;
            font-size: 14px;
            font-weight: 600;
        }
    </style>
</head>
<body>

    <div class="auth-card" id="cardContent">
        <div class="logo-circle">
            <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="3 6 5 6 21 6"></polyline>
                <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                <line x1="10" y1="11" x2="10" y2="17"></line>
                <line x1="14" y1="11" x2="14" y2="17"></line>
            </svg>
        </div>
        
        <h2>Set Your Password</h2>
        <p>Welcome to Isuku Track. Please secure your account by setting a new password.</p>

        <div class="error-state" id="errorMessage">Invalid or missing setup token.</div>

        <form id="resetForm">
            <div class="input-group">
                <label for="newPassword">New Password</label>
                <input type="password" id="newPassword" required placeholder="••••••••">
            </div>
            
            <div class="input-group">
                <label for="confirmPassword">Confirm Password</label>
                <input type="password" id="confirmPassword" required placeholder="••••••••">
            </div>

            <button type="submit" class="btn-submit" id="submitBtn">Save Password & Login</button>
        </form>
    </div>

    <script src="/static/js/api_helper.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // 1. Extract the secure token from the URL (e.g., ?token=xyz123)
            const urlParams = new URLSearchParams(window.location.search);
            const token = urlParams.get('token');
            
            const form = document.getElementById('resetForm');
            const errorDiv = document.getElementById('errorMessage');

            // If someone navigates here without a token, hide the form and show an error
            if (!token) {
                form.style.display = 'none';
                errorDiv.style.display = 'block';
                return;
            }

            // 2. Handle Form Submission
            form.addEventListener('submit', async (e) => {
                e.preventDefault();
                
                const password = document.getElementById('newPassword').value;
                const confirm = document.getElementById('confirmPassword').value;
                const btn = document.getElementById('submitBtn');

                if (password !== confirm) {
                    Swal.fire('Error', 'Passwords do not match. Please try again.', 'error');
                    return;
                }

                // Briefly disable the button to prevent double-clicking
                btn.textContent = 'Saving...';
                btn.disabled = true;

                try {
                    // 3. Fire payload to the backend using your helper
                    await API.post('/auth/reset-password', {
                        token: token,
                        password: password
                    });

                    // Success! 
                    Swal.fire({
                        title: 'Success!',
                        text: 'Your password has been set. Redirecting to login...',
                        icon: 'success',
                        timer: 2000,
                        showConfirmButton: false
                    }).then(() => {
                        window.location.href = '/login'; 
                    });

                } catch (error) {
                    // Reset button and show error
                    btn.textContent = 'Save Password & Login';
                    btn.disabled = false;
                    Swal.fire('Setup Failed', error.message, 'error');
                }
            });
        });
    </script>
</body>
</html>
