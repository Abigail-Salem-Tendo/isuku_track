<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>Vehicles - Isuku Track</title>
	<link rel="stylesheet" href="/static/css/admin_dash.css" />
</head>
<body>
<aside class="sb"><div class="sb-top"><div class="sb-logo"></div><div><div class="sb-name">Isuku Track</div><div class="sb-role">Admin Panel</div></div></div><div class="sb-sec"><div class="sb-lbl">Overview</div><a class="sb-a" href="/admin/dashboard">Dashboard</a><a class="sb-a" href="/admin/zones">Zones</a><a class="sb-a" href="/admin/users">Users</a></div><div class="sb-sec"><div class="sb-lbl">Operations</div><a class="sb-a on" href="/admin/vehicles">Vehicles</a><a class="sb-a" href="/admin/claims">Claims</a><a class="sb-a" href="/admin/payments">Payments</a></div><div class="sb-foot"><div class="sb-profile" tabindex="0"><div class="sb-user"><span class="sb-admin-badge">A</span><button type="button" class="sb-menu-toggle" id="sbMenuToggle" aria-expanded="false" aria-controls="sbProfileMenu"><span></span><span></span><span></span></button></div><div class="sb-menu" id="sbProfileMenu"><a class="sb-menu-item" href="/admin/dashboard">Administrator Access</a><a class="sb-menu-item" href="/admin/dashboard#section-settings">Settings</a><a class="sb-menu-item danger" href="/login">Logout</a></div></div></div></aside>

<div class="main"><div class="topbar"><div class="tb-l"><h1>Vehicles</h1><p>Live data from /api/vehicles/</p></div><div class="tb-r"><div class="ham" onclick="toggleSb()"><span></span><span></span><span></span></div></div></div><div class="page"><div class="card"><div class="ch"><div class="ct">Fleet List</div></div><div class="cb" id="fleetList"></div></div></div></div>
<div class="overlay" id="overlay" onclick="toggleSb()"></div>
<script>
function toggleSb(){var sb=document.querySelector('.sb');var ov=document.getElementById('overlay');if(sb)sb.classList.toggle('open');if(ov)ov.classList.toggle('open');}
(function(){
	var p=document.querySelector('.sb-profile');var t=document.getElementById('sbMenuToggle');
	if(p&&t){t.addEventListener('click',function(e){e.preventDefault();p.classList.toggle('open');t.setAttribute('aria-expanded',p.classList.contains('open')?'true':'false');});document.addEventListener('click',function(e){if(!p.contains(e.target)){p.classList.remove('open');t.setAttribute('aria-expanded','false');}});}
	var list=document.getElementById('fleetList');
	fetch('/api/vehicles/')
		.then(function(res){if(!res.ok) throw new Error('Failed to load vehicles'); return res.json();})
		.then(function(vehicles){
			if(!vehicles.length){list.innerHTML='<p class="ci-meta">No vehicles found.</p>';return;}
			list.innerHTML=vehicles.map(function(v){
				var status=String(v.status||'').toLowerCase();
				var cls=status==='available'?'ok':(status==='in_use'||status==='in use'?'go':'op');
				return '<div class="vi">'+
					'<div class="vp">'+(v.plate_number||'-')+'</div>'+
					'<div><div class="vn">'+(v.driver_name||'-')+'</div><div class="vm">'+(v.driver_phone||'-')+'</div></div>'+
					'<span class="b '+cls+' vi-badge">'+(v.status||'unknown')+'</span>'+
				'</div>';
			}).join('');
		})
		.catch(function(err){list.innerHTML='<p class="ci-meta">'+err.message+'</p>';});
})();
</script>
</body>
</html>
