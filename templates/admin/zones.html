<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Zones - Isuku Track</title>
  <link rel="stylesheet" href="/static/css/admin_dash.css" />
</head>
<body>
<aside class="sb">
  <div class="sb-top"><div class="sb-logo"></div><div><div class="sb-name">Isuku Track</div><div class="sb-role">Admin Panel</div></div></div>
  <div class="sb-sec"><div class="sb-lbl">Overview</div><a class="sb-a" href="/admin/dashboard">Dashboard</a><a class="sb-a on" href="/admin/zones">Zones</a><a class="sb-a" href="/admin/users">Users</a></div>
  <div class="sb-sec"><div class="sb-lbl">Operations</div><a class="sb-a" href="/admin/vehicles">Vehicles</a><a class="sb-a" href="/admin/claims">Claims</a><a class="sb-a" href="/admin/payments">Payments</a></div>
  <div class="sb-foot"><div class="sb-profile" tabindex="0"><div class="sb-user"><span class="sb-admin-badge">A</span><button type="button" class="sb-menu-toggle" id="sbMenuToggle" aria-expanded="false" aria-controls="sbProfileMenu"><span></span><span></span><span></span></button></div><div class="sb-menu" id="sbProfileMenu"><a class="sb-menu-item" href="/admin/dashboard">Administrator Access</a><a class="sb-menu-item" href="/admin/dashboard#section-settings">Settings</a><a class="sb-menu-item danger" href="/login">Logout</a></div></div></div>
</aside>

<div class="main">
  <div class="topbar">
    <div class="tb-l"><h1>Zones</h1><p>Live data from /api/zones/</p></div>
    <div class="tb-r"><div class="ham" onclick="toggleSb()"><span></span><span></span><span></span></div></div>
  </div>

  <div class="page">
    <div class="card">
      <div class="ch"><div class="ct">All Zones</div><a class="ca" href="/admin/dashboard">Back to dashboard</a></div>
      <div class="cb cb--pt" style="overflow-x:auto;">
        <table class="zt" style="min-width:760px;">
          <thead>
            <tr>
              <th>Zone</th>
              <th>District</th>
              <th>Sector</th>
              <th>Cell</th>
              <th>Operator</th>
            </tr>
          </thead>
          <tbody id="zonesTableBody"></tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<div class="overlay" id="overlay" onclick="toggleSb()"></div>

<script>
function toggleSb(){var sb=document.querySelector('.sb');var ov=document.getElementById('overlay');if(sb)sb.classList.toggle('open');if(ov)ov.classList.toggle('open');}

(function(){
  var profile=document.querySelector('.sb-profile');
  var toggle=document.getElementById('sbMenuToggle');
  if(profile&&toggle){
    toggle.addEventListener('click',function(e){e.preventDefault();profile.classList.toggle('open');toggle.setAttribute('aria-expanded',profile.classList.contains('open')?'true':'false');});
    document.addEventListener('click',function(e){if(!profile.contains(e.target)){profile.classList.remove('open');toggle.setAttribute('aria-expanded','false');}});
  }

  var tbody=document.getElementById('zonesTableBody');
  fetch('/api/zones/')
    .then(function(res){if(!res.ok) throw new Error('Failed to load zones'); return res.json();})
    .then(function(zones){
      if(!zones.length){tbody.innerHTML='<tr><td colspan="5">No zones found.</td></tr>';return;}
      tbody.innerHTML=zones.map(function(z){
        return '<tr>'+
          '<td><div class="zn">'+(z.name||'-')+'</div><div class="zg">'+(z.village||'-')+'</div></td>'+
          '<td>'+(z.district||'-')+'</td>'+
          '<td>'+(z.sector||'-')+'</td>'+
          '<td>'+(z.cell||'-')+'</td>'+
          '<td>'+(z.zone_operator_name||'Unassigned')+'</td>'+
        '</tr>';
      }).join('');
    })
    .catch(function(err){tbody.innerHTML='<tr><td colspan="5">'+err.message+'</td></tr>';});
})();
</script>
</body>
</html>
