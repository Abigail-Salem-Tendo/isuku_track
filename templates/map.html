<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Isuku Track - Zone Coverage</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

    <style>
        body { margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        #map { height: 100vh; width: 100vw; }
        
        /* popup card styling */
        .popup-content h3 { margin: 0 0 8px 0; color: #2c3e50; border-bottom: 1px solid #eee; padding-bottom: 5px; }
        .popup-content p { margin: 5px 0; font-size: 14px; color: #34495e; }
        .popup-content strong { color: #2c3e50; }
        .status-badge { 
            display: inline-block; 
            margin-top: 8px; 
            padding: 3px 8px; 
            background-color: #e8f8f5; 
            color: #117a65; 
            border-radius: 12px; 
            font-size: 12px; 
            font-weight: bold; 
        }
        .pending { background-color: #fdf2e9; color: #d35400; }
    </style>
</head>
<body>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <script>
        // 1. Initializing map centered on Kigali
        const map = L.map('map').setView([-1.95, 30.08], 13);

        // 2. Adding OpenStreetMap base layer
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; OpenStreetMap contributors',
            maxZoom: 18
        }).addTo(map);

        // 3. Fetching zones from Flask backend
        async function loadZones() {
            try {
                const response = await fetch('http://127.0.0.1:5000/api/zones/');
                const zones = await response.json();
                console.log("Zone data : ",zones);

                // 4. Loop through the zones and plot coverage circles
                zones.forEach(zone => {
                    if (zone.latitude && zone.longitude) {
                        
                        // circle with 800-meter radius
                        const circle = L.circle([zone.latitude, zone.longitude], {
                            color: '#2980b9',        // Border color (Blue)
                            fillColor: '#3498db',    // Inside color (Lighter Blue)
                            fillOpacity: 0.35,       // Transparency
                            weight: 2,               // Border thickness
                            radius: 800              // Coverage radius in meters
                        }).addTo(map);
                        
                        // Determine if ZO is assigned for the badge styling
                        const isAssigned = zone.zone_operator_name ? true : false;
                        const badgeClass = isAssigned ? 'status-badge' : 'status-badge pending';
                        const badgeText = isAssigned ? 'Operator Assigned' : 'Pending Assignment';


                        const popupContent = `
                            <div class="popup-content">
                                <h3>${zone.name}</h3>
                                <p><strong>District:</strong> ${zone.district}</p>
                                <p><strong>Sector:</strong> ${zone.sector}</p>
                                <p><strong>Cell:</strong> ${zone.cell}</p>
                                <p><strong>Operator:</strong> ${zone.zone_operator_name || '<i>Not yet assigned</i>'}</p>
                                <p><strong>Contact:</strong> ${zone.zone_operator_phone || 'N/A'}</p>
                                <span class="${badgeClass}">${badgeText}</span>
                            </div>
                        `;
                        
                        circle.bindPopup(popupContent);
                    }
                });
            } catch (error) {
                console.error('Error fetching zones:', error);
                alert('Could not load zones. Make sure your Flask backend is running on port 5000 and CORS is enabled!');
            }
        }

        // Triggering the fetch when the page loads
        loadZones();
    </script>
</body>
</html>
